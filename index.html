<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MatChalendar - local-first AI campus planner for UCLA daily life. Sustainability, balance, and intelligent weekly planning." />
    <title>MatChalendar - Campus Life AI Planner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <h1><span class="accent">Mat</span><span class="gold">Cha</span>lendar</h1>
        </div>
        <div id="plannerBadge" class="local-badge" aria-label="Planner status">
          <span class="status-dot"></span>
          Health-first AI planner
        </div>
      </header>

      <section class="workspace" aria-label="MatChalendar one-screen demo">
        <aside class="control-panel" aria-label="Planner controls">
          <section class="carbon-card" aria-label="Weekly carbon budget">
            <div class="card-row">
              <div>
                <p class="kicker">Weekly climate budget</p>
                <div class="carbon-number"><strong id="carbonCurrent">0</strong><span id="carbonTarget">/ 35 kg CO2e</span></div>
              </div>
              <span id="carbonPercent" class="budget-pill">0%</span>
            </div>
            <div class="budget-meter" aria-hidden="true"><span id="carbonMeter"></span></div>
          </section>

          <form id="plannerForm" class="goal-form">
            <label for="promptInput">Planning goal</label>
            <textarea id="promptInput" rows="8">Plan my UCLA week to reduce emissions and waste. I had to take an Uber today, have class from 10 to 2, and need homework time tonight. Help me stay under my weekly carbon budget.</textarea>
            <button class="primary-button" type="submit">Run Planner</button>
            <ol id="compactTrace" class="compact-trace" hidden></ol>
          </form>

          <section id="memoryCard" class="memory-card" aria-label="Memory update suggestion" hidden>
            <p class="kicker">Memory</p>
            <h3>Remember this preference?</h3>
            <p id="memoryReason" class="quiet-copy"></p>
            <div id="memoryPatch" class="memory-patch"></div>
            <div class="memory-actions">
              <button id="saveMemoryBtn" class="secondary-button" type="button">Save</button>
              <button id="ignoreMemoryBtn" class="ghost-button" type="button">Ignore</button>
            </div>
          </section>

          <div class="panel-footer">
            <button id="openMemoryBtn" class="memory-open-button" type="button" aria-haspopup="dialog" aria-expanded="false">
              Memory
            </button>
          </div>
        </aside>

        <section id="memoryViewer" class="memory-viewer" role="dialog" aria-modal="false" aria-labelledby="memoryViewerTitle" hidden>
          <div class="memory-viewer-heading">
            <div>
              <p class="kicker">Memory</p>
              <h2 id="memoryViewerTitle">Saved Preferences</h2>
            </div>
            <button id="closeMemoryBtn" class="close-button" type="button" aria-label="Close memory">&times;</button>
          </div>
          <div id="memoryViewerContent" class="memory-viewer-content" aria-live="polite"></div>
        </section>

        <section class="calendar-panel" aria-label="Weekly calendar">
          <div class="calendar-header">
            <button id="regenerateBtn" class="secondary-button" type="button">Replan</button>
          </div>
          <div id="calendarGrid" class="calendar-grid" aria-live="polite"></div>
        </section>

        <aside class="detail-drawer" aria-label="Contextual explanation drawer" hidden>
          <div id="drawerEmpty" class="drawer-empty"></div>

          <div id="drawerContent" class="drawer-content" hidden>
            <div class="drawer-heading">
              <span id="blockType" class="type-pill"></span>
              <button id="closeDrawer" class="close-button" type="button" aria-label="Close explanation">&times;</button>
            </div>
            <h2 id="blockTitle"></h2>
            <p id="blockMeta" class="block-meta"></p>
            <div id="mealStatus" class="meal-status" hidden></div>

            <section id="menuSection" class="menu-section" hidden>
              <p class="kicker">Meal composition</p>
              <div id="menuSections" class="menu-sections"></div>
            </section>

            <section id="nutritionSection" class="detail-section" hidden>
              <p class="kicker">Health fit</p>
              <div id="nutritionDetails" class="metric-grid"></div>
            </section>

            <section id="impactCard" class="impact-card">
              <p class="kicker">Climate impact</p>
              <div id="climateDetails"></div>
            </section>

            <section id="whySection" class="detail-section" hidden>
              <p class="kicker">Why this meal</p>
              <p id="whyDetails"></p>
            </section>

            <section id="activitySection" class="detail-section" hidden>
              <p class="kicker">Activity</p>
              <div id="activityDetails" class="metric-grid"></div>
            </section>

            <section id="transportSection" class="detail-section" hidden>
              <p class="kicker">Transportation</p>
              <div id="transportDetails" class="metric-grid"></div>
            </section>

            <section id="choicesSection" class="choices-section" hidden>
              <p class="kicker">Choices</p>
              <div id="diningChoices" class="dining-choices"></div>
            </section>
          </div>
        </aside>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
